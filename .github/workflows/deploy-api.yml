name: Deploy API to Cloud Run

on:
  push:
    branches: [main]
    paths: ["api/**"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push
        run: |
          docker build -t us-central1-docker.pkg.dev/signal-499604/signal-api/signal-api:latest ./api
          docker push us-central1-docker.pkg.dev/signal-499604/signal-api/signal-api:latest

      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: signal-api
          region: us-central1
          image: us-central1-docker.pkg.dev/signal-499604/signal-api/signal-api:latest
